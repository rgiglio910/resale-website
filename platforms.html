<!DOCTYPE html>
<html>
<head>
<title>Where to Buy</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

/* Header styles */
header{
  background:#2bc0c0; /* teal header */
  color:black;
  padding:20px;
  text-align:center;
}

nav a{
  color:black;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

/* Flex container for platforms */
.links{
  display:flex;
  justify-content:center; /* centers row */
  gap:80px; /* space between platforms */
  padding:60px 20px; 
  flex-wrap: wrap; /* responsive on smaller screens */
}

/* Individual platform block */
.platform{
  text-align:center;
}

/* Buttons */
button{
  background:black;
  color:white;
  border:none;
  padding:20px 30px; /* bigger buttons */
  margin-bottom:15px;
  cursor:pointer;
  font-size:18px; /* slightly larger font */
  display:block;
  margin-left:auto;
  margin-right:auto;
  border-radius:6px; 
}

/* Platform logos */
.platform-logo{
  display:block;
  margin:0 auto; /* centers image */
  max-width:150px; /* size of logo */
  height:auto;
}

/* Single profile picture below the platforms */
.profile-pic{
  display:block;
  margin:20px auto 0 auto; /* reduced top margin to raise picture */
  max-width:300px; /* larger than logos/buttons */
  height:auto;
  border-radius:50%; /* circular crop */
  box-shadow:0 6px 15px rgba(0,0,0,0.25); /* subtle shadow */
}
</style>
</head>
<body>

<header>
<h1>Shop My Stores</h1>
<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="platforms.html">Where to Buy</a>
</nav>
</header>

<div class="links">

<!-- eBay -->
<div class="platform">
  <a href="https://www.ebay.com/str/giggsstore" target="_blank" rel="noopener noreferrer">
    <button>Shop on eBay</button>
  </a>
  <img src="images/ebay-logo.png" alt="eBay Logo" class="platform-logo">
</div>

<!-- Depop -->
<div class="platform">
  <a href="https://www.depop.com/rgiggs910/" target="_blank" rel="noopener noreferrer">
    <button>Shop on Depop</button>
  </a>
  <img src="images/depop-logo.png" alt="Depop Logo" class="platform-logo">
</div>

<!-- Poshmark -->
<div class="platform">
  <a href="https://poshmark.com/closet/rgiggs910" target="_blank" rel="noopener noreferrer">
    <button>Shop on Poshmark</button>
  </a>
  <img src="images/poshmark-logo.png" alt="Poshmark Logo" class="platform-logo">
</div>

</div>

<!-- Single profile picture below the platforms -->
<img src="images/profile-pic.jpg" alt="Profile Picture" class="profile-pic">

</body>
</html>
